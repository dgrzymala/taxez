    <style>
        @font-face {
            font-family: 'Agrandir Grand';
            src: url('fonts/AgrandirGrand-Heavy.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --purple-light: #9580c2;
            --text: #d0cdc5;
            --text-dim: #9a9590;
            --text-muted: #5e5a55;
            --bg: #191919;
            --bg-card: #252525;
            --border: #333;
            --border-hover: #4a4a4a;
            --heading: 'Agrandir Grand', 'Archivo', 'Helvetica Neue', sans-serif;
            --body: 'IBM Plex Mono', 'DM Mono', 'Courier New', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── COVER ─── */
        .cover {
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border);
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.1s forwards;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ─── HEADER ─── */
        .artist {
            font-family: var(--heading);
            font-size: 1.8rem;
            font-weight: 400;
            text-transform: lowercase;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 0.3rem;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.7s ease 0.25s forwards;
        }

        .track-title {
            font-family: var(--body);
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 0.3rem;
            opacity: 0;
            animation: fadeIn 0.7s ease 0.35s forwards;
        }

        .track-meta {
            font-family: var(--body);
            font-size: 0.72rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 0.7s ease 0.45s forwards;
        }

        /* ─── LINKS ─── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 2.5rem;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.25s ease;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .link:nth-child(1) { animation-delay: 0.5s; }
        .link:nth-child(2) { animation-delay: 0.58s; }
        .link:nth-child(3) { animation-delay: 0.66s; }
        .link:nth-child(4) { animation-delay: 0.74s; }

        .link:hover {
            border-color: var(--border-hover);
            color: var(--purple-light);
            background: #2a2a2a;
        }

        .link-icon { width: 20px; height: 20px; flex-shrink: 0; }

        .link-name {
            font-family: var(--heading);
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: lowercase;
            flex: 1;
        }

        .link-arrow {
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: transform 0.25s ease;
        }

        .link:hover .link-arrow { transform: translateX(3px); }

        /* ─── DIVIDER ─── */
        .sep {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.9s forwards;
        }

        /* ─── SOCIALS ─── */
        .socials {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 1s forwards;
        }

        .social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.25s ease;
        }

        .social:hover {
            border-color: var(--border-hover);
            color: var(--purple-light);
        }

        .social svg { width: 18px; height: 18px; }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.5s ease 1.1s forwards;
        }

        .footer-name {
            font-family: var(--heading);
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: lowercase;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .footer-copy {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
